<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg viewBox='0 0 26 26' fill='none' xmlns='http://www.w3.org/2000/svg'><rect x='2' y='2' width='10' height='10' rx='2.5' fill='%23C4510A'/><rect x='14' y='2' width='10' height='10' rx='2.5' fill='%23C4510A' opacity='.5'/><rect x='2' y='14' width='10' height='10' rx='2.5' fill='%23C4510A' opacity='.3'/><rect x='14' y='14' width='10' height='10' rx='2.5' fill='%23C4510A' opacity='.7'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Inter', sans-serif; box-sizing: border-box; margin: 0; padding: 0; }

  body {
    display: flex;
    justify-content: center;
    padding: 2rem;
    background: #f5f5f5;
  }

  .dropdown {
    width: 280px;
    background: #fff;
    border-radius: 12px;
    border: 0.5px solid #e5e5e5;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  .dropdown-header {
    background: #fff4ec;
    border-bottom: 0.5px solid #fde0c8;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #ff7000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 15px;
    color: #fff;
    flex-shrink: 0;
  }

  .user-name {
    font-size: 14px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 2px;
  }

  .user-email {
    font-size: 12px;
    color: #888;
  }

  .menu-section {
    padding: 6px 0;
  }

  .menu-section + .menu-section {
    border-top: 0.5px solid #f0f0f0;
  }

  .menu-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 18px;
    cursor: pointer;
    transition: background 0.15s;
    text-decoration: none;
  }

  .menu-item:hover {
    background: #fff4ec;
  }

  .menu-item-label {
    font-size: 13px;
    color: #2d2d2d;
    flex: 1;
  }

  .menu-item-label.danger {
    color: #c0392b;
  }

  .chevron {
    margin-left: auto;
  }
</style>
</head>
<body>

<div class="dropdown">

  <div class="dropdown-header">
    <div class="avatar">SM</div>
    <div>
      <div class="user-name">Sparsh Modi</div>
      <div class="user-email">sparshmodi1@gmail.com</div>
    </div>
  </div>

  <div class="menu-section">
    <a href="#" class="menu-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
      <span class="menu-item-label">Profile</span>
    </a>

    <a href="#" class="menu-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M12 2v2m0 16v2m8.66-13-1.73 1M5.07 17l-1.73 1M20.66 17l-1.73-1M5.07 7 3.34 6M22 12h-2M4 12H2"/>
      </svg>
      <span class="menu-item-label">Account settings</span>
    </a>

    <a href="#" class="menu-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2m11-11h-2M3 12H1"/>
      </svg>
      <span class="menu-item-label">Theme</span>
      <svg class="chevron" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2" stroke-linecap="round">
        <path d="M9 18l6-6-6-6"/>
      </svg>
    </a>
  </div>

  <div class="menu-section">
    <a href="#" class="menu-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <span class="menu-item-label">Switch account</span>
    </a>

    <a href="{% url 'logout' %}" class="menu-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#c0392b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      <span class="menu-item-label danger">Log out</span>
    </a>
  </div>

</div>

</body>
</html>
